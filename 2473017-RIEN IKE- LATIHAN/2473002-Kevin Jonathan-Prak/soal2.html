<!DOCTYPE html>
<!--
Nama        : Rien Ike
NRP         : 2473017
-->

<html>
<head>
    <title>2473017 - Rien ike</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            background-color: #f4f4f4;
            padding: 40px;
        }

        .main-container {
            background-color: #ffffff;
            border: 1px solid #ccc;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            width: 900px;
            overflow: hidden;
        }

        .header {
            background-color: #F09C1D;
            text-align: center;
            padding: 15px 0;
            margin: 20px;
        }

        .header h1 {
            font-family: 'Roboto', sans-serif;
            font-size: 3em;
            color: #402D26;
            margin: 0;
        }

        .content {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
        }

        .burger-table {
            width: 540px;
            height: 420px;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .burger-table td {
            width: 30px;
            height: 30px;
            padding: 0;
            margin: 0;
        }

        .ingredients-box {
            background-color: #F09C1D;
            border-radius: 8px;
            padding: 25px 30px;
            width: 250px;
            color: #ffffff;
        }

        .ingredients-box h2 {
            text-align: center;
            color: #402D26;
            margin-top: 0;
            margin-bottom: 20px;
            font-family: 'Roboto', sans-serif;
            font-size: 1.4em;
        }

        .ingredients-list {
            list-style-type: disc;
            padding-left: 20px;
            margin: 0;
        }

        .ingredients-list li {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .ing-name {
            text-decoration: underline;
        }
    </style>

    <script type="text/javascript">
        document.addEventListener("DOMContentLoaded", function() {
            const layout = [
                "00000OOOOOOOO00000",
                "0000OBBBBBBBBO0000",
                "000OBBBBBBBBBBO000",
                "00OBBWOBBBBWOBBO00",
                "00OBBOOBBBBOOBBO00",
                "00ORRBBBOOOBBRRO00",
                "00OBBBBBBBBBBBBO00",
                "00OOOOOOOOOOOOOO00",
                "00OPPPPPPPPPPPPO00",
                "00OLLLLLLLLLLLLO00",
                "00ORRRORRRRORRRO00",
                "00OBBBBBBBBBBBBO00",
                "00OBBBBBBBBBBBBO00",
                "000OOOOOOOOOOOO000"
            ];

            const colors = {
                '0': 'transparent',
                'O': '#402D26',
                'B': '#F09C1D',
                'W': '#FFFFFF',
                'R': '#F0212E',
                'P': '#785010',
                'L': '#91E81C'
            };

            let htmlTable = '<table class="burger-table">';
            for (let row of layout) {
                htmlTable += '<tr>';
                for (let char of row) {
                    htmlTable += `<td style="background-color: ${colors[char]};"></td>`;
                }
                htmlTable += '</tr>';
            }
            htmlTable += '</table>';

            document.getElementById('burger-canvas').innerHTML = htmlTable;
        });
    </script>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <h1>Happy Hamburger</h1>
        </div>

        <div class="content">
            
            <div id="burger-canvas"></div>

            <div class="ingredients-box">
                <h2>Ingredients</h2>
                <ul class="ingredients-list">
                    <li><span class="ing-name">Bun</span> <span>x 2</span></li>
                    <li><span class="ing-name">Lettuce</span> <span>x 1</span></li>
                    <li><span class="ing-name">Tomato</span> <span>x 3</span></li>
                    <li><span class="ing-name">Cheese</span> <span>x 0</span></li>
                    <li><span class="ing-name">Patty</span> <span>x 1</span></li>
                    <li><span class="ing-name">Pickles</span> <span>x 0</span></li>
                </ul>
            </div>

        </div>
    </div>

</body>
</html>
