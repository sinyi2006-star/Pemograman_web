<!DOCTYPE html>
<!--
Nama        : Rien Ike
NRP         : 2473017
-->

<html>
<head>
    <title>2473017 - Rien ike</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background-color: #323437;
            color: #e2b714; 
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 80%;
            margin-top: 40px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background-color: #323437;
            color: #e2b714;
            border: 1px solid #e2b714;
            border-radius: 5px;
            padding: 15px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 30px;
            resize: none;
            outline: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        td {
            border: 1px solid #e2b714;
            padding: 12px 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.1s;
        }

        td:hover {
            background-color: rgba(226, 183, 20, 0.15);
        }

        td:active {
            background-color: aqua;
            color: #323437;
        }

        .tombol-spesial {
            color: aqua;
        }

        footer {
            margin-top: 50px;
            border-top: 1px solid #e2b714;
            width: 100%;
            text-align: center;
            padding-top: 15px;
            padding-bottom: 20px;
            font-size: 12px;
            color: #dcdcdc;
            font-family: Consolas, monospace;
        }
    </style>

    <script type="text/javascript">
        window.onload = function() {
            const layar = document.getElementById("layarTeks");
            const tombolTombol = document.querySelectorAll("td");

            tombolTombol.forEach(function(tombol) {
                tombol.addEventListener("click", function() {
                    const teksTombol = this.innerText;

                    if (teksTombol === "Backspace") {
                        layar.value = layar.value.slice(0, -1);
                    } 
                    else if (teksTombol === "Space") {
                        layar.value += " ";
                    } 
                    else if (teksTombol === "Enter") {
                        layar.value += "\n";
                    } 
                    else if (teksTombol === "Tab" || teksTombol === "Caps Lock" || 
                             teksTombol === "Shift" || teksTombol === "Ctrl" || 
                             teksTombol === "Alt") {
                        return;
                    } 
                    else {
                        layar.value += teksTombol;
                    }
                    
                    layar.focus();
                });
            });
        };
    </script>
</head>
<body>

    <div class="container">
        <textarea id="layarTeks" placeholder="Ketik di sini atau gunakan keyboard di bawah..."></textarea>

        <table>
            <tr>
                <td>~</td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td><td>0</td><td>-</td><td>=</td><td colspan="2" class="tombol-spesial">Backspace</td>
            </tr>
            <tr>
                <td colspan="2" class="tombol-spesial">Tab</td><td>Q</td><td>W</td><td>E</td><td>R</td><td>T</td><td>Y</td><td>U</td><td>I</td><td>O</td><td>P</td><td>[</td><td>]</td><td>\</td>
            </tr>
            <tr>
                <td colspan="2" class="tombol-spesial">Caps Lock</td><td>A</td><td>S</td><td>D</td><td>F</td><td>G</td><td>H</td><td>J</td><td>K</td><td>L</td><td>;</td><td>'</td><td colspan="2" class="tombol-spesial">Enter</td>
            </tr>
            <tr>
                <td colspan="3" class="tombol-spesial">Shift</td><td>Z</td><td>X</td><td>C</td><td>V</td><td>B</td><td>N</td><td>M</td><td>,</td><td>.</td><td>/</td><td colspan="2" class="tombol-spesial">Shift</td>
            </tr>
            <tr>
                <td colspan="2" class="tombol-spesial">Ctrl</td>
                <td colspan="2" class="tombol-spesial">Alt</td>
                <td colspan="7" class="tombol-spesial">Space</td>
                <td colspan="2" class="tombol-spesial">Alt</td>
                <td colspan="2" class="tombol-spesial">Ctrl</td>
            </tr>
        </table>
    </div>

    <footer>
        &copy; NRP Nama - Text Editor
    </footer>

</body>
</html>
