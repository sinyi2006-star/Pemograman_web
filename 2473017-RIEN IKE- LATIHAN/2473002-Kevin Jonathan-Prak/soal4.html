<!DOCTYPE html>
<!--
Nama        : Rien Ike
NRP         : 2473017
-->

<html>
<head>
    <title>2473017 - Rien ike</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            margin: 20px;
        }

        .kalkulator-box {
            border: 1px solid #ccc;
            padding: 15px;
            width: 300px;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.2);
            background-color: #fcfcfc;
        }

        .baris-input {
            margin-bottom: 8px;
        }

        .baris-input label {
            display: inline-block;
            width: 110px;
            font-size: 16px;
        }

        .baris-input input {
            width: 100px;
        }

        button {
            margin-top: 5px;
            margin-bottom: 15px;
            padding: 2px 10px;
            cursor: pointer;
        }

        table {
            border-collapse: collapse;
            text-align: center;
            font-size: 22px; 
            width: 100%;
            background-color: white;
        }

        td {
            border: 1px solid black;
            padding: 5px 10px;
        }
        
        td:nth-child(1), td:nth-child(3) { 
            width: 25%; 
        }
        
        td:nth-child(2), td:nth-child(4) { 
            width: 10%; 
        }
        
        td:nth-child(5) { 
            width: 30%; 
        }
    </style>

    <script type="text/javascript">
        function hitung() {
            var input1 = document.getElementById("angka1").value;
            var input2 = document.getElementById("angka2").value;

            var a = parseInt(input1);
            var b = parseInt(input2);

            if (isNaN(a) || isNaN(b)) {
                alert("Silakan masukkan angka yang valid!");
                return;
            }

            var hasilTambah = a + b;
            var hasilKurang = a - b;

            var tabelOutput = "<table>";
            
            tabelOutput += "<tr>";
            tabelOutput += "<td>" + a + "</td>";
            tabelOutput += "<td>+</td>";
            tabelOutput += "<td>" + b + "</td>";
            tabelOutput += "<td>=</td>";
            tabelOutput += "<td>" + hasilTambah + "</td>";
            tabelOutput += "</tr>";

            tabelOutput += "<tr>";
            tabelOutput += "<td>" + a + "</td>";
            tabelOutput += "<td>-</td>";
            tabelOutput += "<td>" + b + "</td>";
            tabelOutput += "<td>=</td>";
            tabelOutput += "<td>" + hasilKurang + "</td>";
            tabelOutput += "</tr>";

            tabelOutput += "</table>";

            document.getElementById("area-hasil").innerHTML = tabelOutput;
        }
    </script>
</head>
<body>

    <div class="kalkulator-box">
        <div class="baris-input">
            <label>Angka Pertama :</label>
            <input type="number" id="angka1">
        </div>
        
        <div class="baris-input">
            <label>Angka Kedua :</label>
            <input type="number" id="angka2">
        </div>

        <button onclick="hitung()">Count</button>

        <div id="area-hasil">
            <table>
                <tr>
                    <td style="height: 30px;"></td>
                    <td>+</td>
                    <td></td>
                    <td>=</td>
                    <td></td>
                </tr>
                <tr>
                    <td style="height: 30px;"></td>
                    <td>-</td>
                    <td></td>
                    <td>=</td>
                    <td></td>
                </tr>
            </table>
        </div>
    </div>

</body>
</html>
